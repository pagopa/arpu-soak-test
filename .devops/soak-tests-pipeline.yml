# Run Automated Test in UAT environment

trigger: none

pool:
  vmImage: ubuntu-22.04

parameters:
  - name: "TARGET_ENV"
    displayName: "Target Environment"
    type: string
    default: "UAT"
    values:
      - "DEV"
      - "UAT"

  - name: "USE_INTERNAL_ACCESS_ENV"
    displayName: "Internal access to k8s services"
    type: boolean
    default: false

  - name: "SCRIPT"
    displayName: "Script name"
    type: string
    default: "runAll"
    values:
      - runAll

      - runAll_Auth
      - Auth_getAuthenticationEndpoint
      - Auth_getLogoutEndpoint
      - Auth_getUserInfo

      - runAll_TokenAssistance
      - TokenAssistance_getZendeskAssistanceToken

      - Broker_getPublicBrokerInfo

      - Organization_getOrganizationsWithSpontaneous

      - runAll_DebtPositionTypeOrg
      - DebtPositionTypeOrg_getDebtPositionTypeOrgsWithSpontaneous
      - DebtPositionTypeOrg_getDebtPositionTypeOrgsWithSpontaneousDetail
      - DebtPositionTypeOrg_getMostUsedSpontaneousDebtPositionTypeOrgsForCurrentYear

      - runAll_DebtPosition
      - DebtPosition_getPagedUnpaidDebtPositions
      - DebtPosition_getDebtorUnpaidDebtPositionOverview
      - DebtPosition_getUnpaidPaymentNoticeZip
      - DebtPosition_getPaymentNotice
      - DebtPosition_createSpontaneousDebtPosition
      - DebtPosition_createSpontaneousDebtPositionCie
      - DebtPosition_getDebtPositionDetail

      - runAll_Installment
      - Installment_getDebtorUnpaidDebtPositionInstallments
      - Installment_getPublicInstallmentsByIuvOrNav

  - name: "BROKER_ID"
    displayName: "Broker ID"
    type: string

  - name: "SCENARIO"
    displayName: "Soak test type"
    type: string
    default: "Fixed TPS"
    values:
      - "Fixed TPS"
      - "Growing TPS"

  - name: "VUS_MAX_ENV"
    displayName: "Max TPS"
    type: number

  - name: "SCENARIO_DURATION_ENV"
    displayName: "Test duration in seconds"
    type: number
    default: 30

  - name: "SCENARIO_RAMP_STAGE_NUMBER_ENV"
    displayName: "The number of steps for the growing TPS scenario (at least 3)"
    type: number
    default: 10

  - name: "THRESHOLDS_API_MAX_MAX_MS_ENV"
    displayName: "Max MAX milliseconds applied as default to single API tests"
    type: number
    default: 1000
  - name: "THRESHOLDS_API_MAX_AVG_MS_ENV"
    displayName: "Max AVG milliseconds applied as default to single API tests"
    type: number
    default: 500
  - name: "THRESHOLDS_API_MAX_P90_MS_ENV"
    displayName: "Max P90 milliseconds applied as default to single API tests"
    type: number
    default: 800
  - name: "THRESHOLDS_API_MAX_P95_MS_ENV"
    displayName: "Max P95 milliseconds applied as default to single API tests"
    type: number
    default: 1000

variables:
  # Comma separated list of tests to execute based on the SCRIPT parameter (if some test require the execution of more than one test, eg data preparation)
  - name: k6Test_runAll
    value: ./


  - name: k6Test_runAll_Auth
    value: auth/

  - name: k6Test_Auth_getAuthenticationEndpoint
    value: auth/getAuthenticationEndpoint.js

  - name: k6Test_Auth_getUserInfo
    value: auth/getUserInfo.js

  - name: k6Test_Auth_getLogoutEndpoint
    value: auth/getLogoutEndpoint.js

  - name: k6Test_runAll_TokenAssistance
    value: tokenAssistance/

  - name: k6Test_TokenAssistance_getZendeskAssistanceToken
    value: tokenAssistance/getZendeskAssistanceToken.js

  - name: k6Test_Broker_getPublicBrokerInfo
    value: broker/getPublicBrokerInfo.js

  - name: k6Test_Organization_getOrganizationsWithSpontaneous
    value: organization/getOrganizationsWithSpontaneous.js

  - name: k6Test_runAll_DebtPositionTypeOrg
    value: debtPositionTypeOrg/

  - name: k6Test_DebtPositionTypeOrg_getDebtPositionTypeOrgsWithSpontaneous
    value: debtPositionTypeOrg/getDebtPositionTypeOrgsWithSpontaneous.js

  - name: k6Test_DebtPositionTypeOrg_getDebtPositionTypeOrgsWithSpontaneousDetail
    value: debtPositionTypeOrg/getDebtPositionTypeOrgsWithSpontaneousDetail.js
  
  - name: k6Test_DebtPositionTypeOrg_getMostUsedSpontaneousDebtPositionTypeOrgsForCurrentYear
    value: debtPositionTypeOrg/getMostUsedSpontaneousDebtPositionTypeOrgsForCurrentYear.js
  
  - name: k6Test_runAll_DebtPosition
    value: debtPosition/
 
  - name: k6Test_DebtPosition_getPagedUnpaidDebtPositions
    value: debtPosition/getPagedUnpaidDebtPositions.js
 
  - name: k6Test_DebtPosition_getDebtorUnpaidDebtPositionOverview
    value: debtPosition/getDebtorUnpaidDebtPositionOverview.js
  
  - name: k6Test_DebtPosition_getUnpaidPaymentNoticeZip
    value: debtPosition/getUnpaidPaymentNoticeZip.js
  
  - name: k6Test_DebtPosition_getPaymentNotice
    value: debtPosition/getPaymentNotice.js

  - name: k6Test_DebtPosition_createSpontaneousDebtPosition
    value: debtPosition/createSpontaneousDebtPosition.js

  - name: k6Test_DebtPosition_createSpontaneousDebtPositionCie
    value: debtPosition/createSpontaneousDebtPositionCie.js
  
  - name: k6Test_DebtPosition_getDebtPositionDetail
    value: debtPosition/getDebtPositionDetail.js

  - name: k6Test_runAll_Installment
    value: installment/

  - name: k6Test_Installment_getDebtorUnpaidDebtPositionInstallments
    value: installment/getDebtorUnpaidDebtPositionInstallments.js

  - name: k6Test_Installment_getPublicInstallmentsByIuvOrNav
    value: installment/getPublicInstallmentsByIuvOrNav.js
    
  # Resolved list of k6 script to execute
  - name: SCRIPTS_TO_EXECUTE
    value: ${{ variables[format('k6Test_{0}', parameters.SCRIPT)] }}
  
  # Setting env specific settings
  - ${{ if eq(parameters.TARGET_ENV, 'dev') }}:
      - name: selfHostedAgentPool
        value: $(DEV_AGENT_POOL)
  - ${{ else }}:
      - name: selfHostedAgentPool
        value: $(UAT_AGENT_POOL)

  # Decoding scenario type
  - ${{ if eq(parameters.SCENARIO, 'Fixed TPS') }}:
      - name: SCENARIO_TYPE_ENV
        value: constantArrivalRate
  - ${{ else }}:
      - name: SCENARIO_TYPE_ENV
        value: rampingGrowingArrivalRate

jobs:
  - deployment: SoakTest
    displayName: "Executing '${{ parameters.SCRIPT }}' (${{ parameters.SCENARIO }}) test on ${{ parameters.TARGET_ENV }} (internal access: ${{ parameters.USE_INTERNAL_ACCESS_ENV }})"
    pool:
      name: $(selfHostedAgentPool)
    environment: ${{ upper(parameters.TARGET_ENV) }}
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
              displayName: Checkout
              fetchDepth: 1
            
            - script: |
                docker pull grafana/k6:latest
              displayName: Pull k6 image
            
            - ${{ each k6Test in split(variables.SCRIPTS_TO_EXECUTE, ',') }}:
                - script: |
                    chmod +x runAll.sh
                    chmod +x run.sh
                    docker run --rm \
                      --user $UID \
                      -v $(pwd):/app \
                      --workdir "/app" \
                      -e RESULTS_DIR=/app \
                      -e USE_INTERNAL_ACCESS_ENV=${{ parameters.USE_INTERNAL_ACCESS_ENV }} \
                      -e SCENARIO_TYPE_ENV=${{ variables.SCENARIO_TYPE_ENV }} \
                      \
                      -e VUS_MAX_ENV=${{ parameters.VUS_MAX_ENV }} \
                      -e SCENARIO_DURATION_ENV=${{ parameters.SCENARIO_DURATION_ENV }} \
                      -e SCENARIO_RAMP_STAGE_NUMBER_ENV=${{ parameters.SCENARIO_RAMP_STAGE_NUMBER_ENV }} \
                      \
                      -e THRESHOLDS_API_MAX_AVG_MS_ENV=${{ parameters.THRESHOLDS_API_MAX_AVG_MS_ENV }} \
                      -e THRESHOLDS_API_MAX_MAX_MS_ENV=${{ parameters.THRESHOLDS_API_MAX_MAX_MS_ENV }} \
                      -e THRESHOLDS_API_MAX_P90_MS_ENV=${{ parameters.THRESHOLDS_API_MAX_P90_MS_ENV }} \
                      -e THRESHOLDS_API_MAX_P95_MS_ENV=${{ parameters.THRESHOLDS_API_MAX_P95_MS_ENV }} \
                      \
                      -e BROKER_ID=${{ parameters.BROKER_ID }} \
                      --entrypoint /app/runAll.sh \
                      grafana/k6:latest \
                      ${{ parameters.TARGET_ENV }} ${{k6Test}}
                  condition: true
                  displayName: Run k6 ${{k6Test}} on ${{ parameters.TARGET_ENV }}
            
            - task: PublishTestResults@2
              condition: true
              displayName: "Publishing test results"
              inputs:
                testResultsFormat: "JUnit"
                testResultsFiles: "results/**/*-result.xml"
                searchFolder: "$(System.DefaultWorkingDirectory)"
                failTaskOnFailedTests: true

            - task: PublishPipelineArtifact@1
              displayName: "Publishing test artifacts"
              condition: true
              inputs:
                artifact: "results"
                targetPath: "results"
                publishLocation: "pipeline"
